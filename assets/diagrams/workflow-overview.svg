<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">THEFAYTH workflow overview</title>
  <desc id="desc">Public visitors move through GitHub, the live site, forum rooms, archive pages, human review, and public outputs while the private engine remains protected.</desc>
  <rect width="1400" height="820" fill="#140815"/>
  <rect x="50" y="52" width="1300" height="716" rx="30" fill="#211126" stroke="#d7a46f" stroke-width="3"/>
  <text x="90" y="110" fill="#ffe6c8" font-family="Georgia, serif" font-size="46">THEFAYTH workflow overview</text>
  <text x="90" y="150" fill="#d9b99a" font-family="Arial, sans-serif" font-size="22">Public surface. Private engine. Receipts always.</text>
  <g font-family="Arial, sans-serif" font-size="24" fill="#fff4e8" text-anchor="middle">
    <rect x="90" y="250" width="190" height="92" rx="18" fill="#321836" stroke="#d7a46f"/>
    <text x="185" y="304">Visitors</text>
    <rect x="360" y="210" width="230" height="92" rx="18" fill="#321836" stroke="#d7a46f"/>
    <text x="475" y="265">GitHub surface</text>
    <rect x="360" y="350" width="230" height="92" rx="18" fill="#321836" stroke="#d7a46f"/>
    <text x="475" y="405">thefayth.net</text>
    <rect x="680" y="210" width="220" height="92" rx="18" fill="#321836" stroke="#d7a46f"/>
    <text x="790" y="265">Forum rooms</text>
    <rect x="680" y="350" width="220" height="92" rx="18" fill="#321836" stroke="#d7a46f"/>
    <text x="790" y="405">Archive pages</text>
    <rect x="980" y="280" width="230" height="92" rx="18" fill="#1f3a29" stroke="#7cf2a0"/>
    <text x="1095" y="335">Human review</text>
    <rect x="980" y="510" width="230" height="92" rx="18" fill="#321836" stroke="#d7a46f"/>
    <text x="1095" y="565">Public outputs</text>
    <rect x="360" y="560" width="230" height="92" rx="18" fill="#27112a" stroke="#d7a46f"/>
    <text x="475" y="615">FaithCheltenham.com</text>
    <rect x="90" y="560" width="190" height="92" rx="18" fill="#3a1519" stroke="#ff8c8c"/>
    <text x="185" y="600">Private</text>
    <text x="185" y="630">engine</text>
  </g>
  <g stroke="#d7a46f" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M280 296 H360"/>
    <path d="M280 296 C320 400 330 396 360 396"/>
    <path d="M590 256 H680"/>
    <path d="M590 396 H680"/>
    <path d="M900 256 C940 260 950 306 980 326"/>
    <path d="M900 396 C940 390 950 350 980 326"/>
    <path d="M1095 372 V510"/>
    <path d="M590 606 C720 610 850 580 980 556"/>
  </g>
  <path d="M280 606 C500 520 720 470 980 326" stroke="#ff8c8c" stroke-width="4" fill="none" stroke-dasharray="12 12"/>
  <text x="605" y="515" fill="#ffb3b3" font-family="Arial, sans-serif" font-size="20">protected boundary</text>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#d7a46f"/></marker></defs>
</svg>
